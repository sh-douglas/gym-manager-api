services:
  postgres:
    image: postgres:16-alpine
    container_name: gym_manager_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - gym_manager_pg_data:/var/lib/postgresql/data

volumes:
  gym_manager_pg_data:
